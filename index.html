:root {
  --cream: #f5f0eb;
  --dark: #1a1a18;
  --mid: #6b6b63;
  --accent: #c8b89a;
}

body {
  background-color: var(--cream);
  color: var(--dark);
  font-family: 'Montserrat', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  overflow-x: hidden;
}

/* Subtle grain texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 440px;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* Thin decorative line top */
.line-top {
  width: 1px;
  height: 60px;
  background: linear-gradient(to bottom, transparent, var(--accent));
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeIn 1s ease 0.2s forwards;
}

/* Photo */
.photo-wrapper {
  position: relative;
  width: 110px;
  height: 110px;
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.4s forwards;
}

.photo-wrapper::before {
  content: '';
  position: absolute;
  inset: -6px;
  border: 1px solid var(--accent);
  border-radius: 50%;
  opacity: 0.5;
}

.photo-wrapper img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  filter: grayscale(100%) contrast(1.05);
}

/* Name */
.name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 2rem;
  letter-spacing: 0.08em;
  text-align: center;
  color: var(--dark);
  margin-bottom: 6px;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.6s forwards;
}

/* Taglines */
.taglines {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 0.9s ease 0.8s forwards;
}

.tagline {
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--mid);
  text-align: center;
}

.tagline-italic {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.85rem;
  letter-spacing: 0.05em;
  color: var(--accent);
  text-transform: none;
  margin-top: 4px;
}

/* Divider */
.divider {
  width: 40px;
  height: 1px;
  background: var(--accent);
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeIn 0.9s ease 1s forwards;
}

/* Links */
.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin-bottom: 60px;
}

.link-item {
  opacity: 0;
  animation: fadeUp 0.8s ease forwards;
}

.link-item:nth-child(1) { animation-delay: 1.1s; }
.link-item:nth-child(2) { animation-delay: 1.3s; }

.link-item a {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 28px;
  border: 1px solid rgba(200, 184, 154, 0.4);
  background: rgba(255, 255, 255, 0.5);
  text-decoration: none;
  color: var(--dark);
  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
}

.link-item a::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  width: 0;
  height: 100%;
  background: var(--dark);
  transition: width 0.35s ease;
  z-index: 0;
}

.link-item a:hover::before {
  width: 100%;
}

.link-item a:hover .link-label,
.link-item a:hover .link-sub,
.link-item a:hover .link-arrow {
  color: var(--cream);
}

.link-content {
  position: relative;
  z-index: 1;
}

.link-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--dark);
  transition: color 0.35s ease;
  display: block;
  margin-bottom: 3px;
}

.link-sub {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--mid);
  transition: color 0.35s ease;
}

.link-arrow {
  font-size: 1rem;
  color: var(--accent);
  position: relative;
  z-index: 1;
  transition: color 0.35s ease, transform 0.35s ease;
}

.link-item a:hover .link-arrow {
  transform: translateX(4px);
}

/* Bottom line */
.line-bottom {
  width: 1px;
  height: 60px;
  background: linear-gradient(to bottom, var(--accent), transparent);
  opacity: 0;
  animation: fadeIn 1s ease 1.6s forwards;
}

/* Animations */
@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(18px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
